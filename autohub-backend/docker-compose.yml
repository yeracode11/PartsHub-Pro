services:
  postgres:
    image: postgres:16-alpine
    container_name: autohub-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-autohub}
      POSTGRES_USER: ${DB_USER:-autohub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-autohub_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  grafana:
    image: grafana/grafana:11.1.4
    container_name: autohub-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"


  backend:
    build: .
    container_name: autohub-backend
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-autohub_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      DB_NAME: ${DB_NAME:-autohub}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOKI_HOST: ${LOKI_HOST:-http://78.140.246.83:3100}
      LOKI_SERVICE_NAME: ${LOKI_SERVICE_NAME:-autohub-backend}
      LOKI_ENV: ${LOKI_ENV:-production}
      GREEN_API_URL: ${GREEN_API_URL:-https://7105.api.greenapi.com}
      GREEN_MEDIA_URL: ${GREEN_MEDIA_URL:-https://7105.media.greenapi.com}
      GREEN_API_ID_INSTANCE: ${GREEN_API_ID_INSTANCE:-7105313983}
      GREEN_API_INSTANCE_NAME: ${GREEN_API_INSTANCE_NAME:-7105313983}
      GREEN_API_TOKEN_INSTANCE: ${GREEN_API_TOKEN_INSTANCE:-}
    ports:
      - "${BACKEND_PORT:-3002}:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
  loki_data:

